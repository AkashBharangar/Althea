# Blueprint: https://render.com/docs/blueprint-spec
# Deploy the API from the `backend` directory.
services:
  - type: web
    name: althea-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CLIENT_ORIGIN
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        sync: false
